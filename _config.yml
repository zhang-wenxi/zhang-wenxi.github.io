# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

header:
  overlay_color: "#000"
  overlay_filter: "0.5"
  actions:
    - label: "Learn More"
      url: "https://mmistakes.github.io"

# This is the key line for your menu:
navigation:
  - main

# Site Settings
locale: "en-US"
title: "Zhang Wen Xi" # <--- Change this to your name
email: zhang_wen_xi@yahoo.com.sg
description: "Software Engineer and Product Manager specializing in ERP and AI solutions." # <--- Update this

# URL Settings
baseurl: "" # Keep as "" if your site is at username.github.io
url: "https://zhang-wenxi.github.io" # <--- Update to your actual GitHub URL

# Social Links
github_username: "zhang-wenxi" # <--- Change to your GitHub username
# twitter_username: jekyllrb # Delete this if you don't use Twitter

# Pagination Settings
paginate: 5
paginate_path: "/page:num/"

# Build settings
remote_theme: "mmistakes/minimal-mistakes@4.24.0"

# Add this line to tell Jekyll which theme 'flavor' to use internally
minimal_mistakes_skin: "default" 
plugins:
  - jekyll-seo-tag
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

search: true

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Sass settings
sass:
  quiet_deps: true
  sass_dir: _sass
  style: compressed

author: "Zhang Wen Xi" # This MUST match the top line of your authors.yml

# Add this at the bottom of your _config.yml
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"
      author_profile: false # Hides the bio/photo block by default
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "single"
      author_profile: false
      show_date: true # This turns on the date globally for all posts

